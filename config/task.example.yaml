template:
  profile: "apartment"
  path: "C:/Users/allid/OneDrive/Desktop/DEV/realtify-tests/ДН 15-Ж Аналоги Червень.xls"

collection:
  mode: "discover"
  sources_config: "config/sources.yaml"
  required_count: 5
  only_newbuilds: true
  max_discovered_links: 25
  discovery_pages: 1
  selection:
    enabled: true
    require_city_match: true
    require_address: true
    require_area: true
    require_price_usd: true
    require_screenshot: true
    strict_same_rooms: false
    preferred_area_delta_pct: 35
    max_area_delta_pct: 50
  market_overview_enabled: false
  full_page_screenshots: true
  report_image_mode: "readable_compressed"

adjustments:
  bargaining:
    enabled: false
    note: "Do not overwrite Корегування на торг in MVP."
    exposure_months: 3
    annual_discount_rate_pct: 23
    annual_market_growth_pct: 5
    round_to_pct: 1

output:
  directory: "outputs"
  word_format: "docx"
  monthly_folder: true
